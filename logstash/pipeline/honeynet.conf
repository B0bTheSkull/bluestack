# HoneyNet ingestion pipeline
#
# HoneyNet emits newline-delimited JSON — one event per line.
# Shape: timestamp, honeypot ("SSH"|"HTTP"|"FTP"|"SYSTEM"), source_ip,
# source_port, event_type, details{...}

input {
  tcp {
    port => 5003
    codec => json_lines
    type => "honeynet"
    tags => ["honeynet", "deception", "honeypot"]
  }
}

filter {
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # All honeypot interactions are inherently suspicious — tag accordingly.
  if [honeypot] != "SYSTEM" {
    mutate { add_field => { "severity" => "MEDIUM" } }
  }
  if [event_type] == "coordinated_scan" {
    mutate { update => { "severity" => "HIGH" } }
    mutate { add_field => { "[mitre][technique_id]" => "T1595.001"
                            "[mitre][tactic]"       => "reconnaissance" } }
  } else if [event_type] == "credential_attempt" {
    mutate { add_field => { "[mitre][technique_id]" => "T1110"
                            "[mitre][tactic]"       => "credential-access" } }
  } else if [event_type] == "command_executed" {
    mutate { add_field => { "[mitre][technique_id]" => "T1059"
                            "[mitre][tactic]"       => "execution" } }
  } else if [event_type] == "file_upload_attempt" {
    mutate { add_field => { "[mitre][technique_id]" => "T1105"
                            "[mitre][tactic]"       => "command-and-control" } }
  }

  # Hoist common detail fields up so they index as scalars
  if [details][username] {
    mutate { add_field => { "auth_username" => "%{[details][username]}" } }
  }
  if [details][password] {
    mutate { add_field => { "auth_password_attempt" => "%{[details][password]}" } }
  }
  if [details][command] {
    mutate { add_field => { "command" => "%{[details][command]}" } }
  }
  if [details][user_agent] {
    mutate { add_field => { "user_agent" => "%{[details][user_agent]}" } }
  }

  if [source_ip] {
    mutate { add_field => { "[source][ip]" => "%{source_ip}" } }
  }

  mutate { add_field => { "source_tool" => "honeynet" } }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bluestack-honeynet-%{+YYYY.MM.dd}"
    action => "create"
  }
}
