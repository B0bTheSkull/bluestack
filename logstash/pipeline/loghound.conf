# LogHound ingestion pipeline
#
# LogHound emits a single wrapped report containing a `findings` array.
# We split that array so each finding becomes its own Elasticsearch document.
#
# Two ingest modes:
#   1. TCP 5001 — `cat report.json | nc -q1 localhost 5001` or live pipe
#   2. HTTP POST — `curl -XPOST -H "Content-Type: application/json" \
#                     --data @report.json http://localhost:5001/`  (TCP json)

input {
  tcp {
    port => 5001
    codec => json
    type => "loghound"
    tags => ["loghound", "blue-team", "log-analysis"]
  }
}

filter {
  # Wrapped report shape: explode findings[] into one event per finding.
  if [findings] {
    split {
      field => "findings"
    }

    # Hoist scan-level metadata onto each finding event so dashboards
    # can filter by source log file or scan time.
    mutate {
      add_field => {
        "[scan][generated_at]" => "%{[generated_at]}"
        "[scan][log_type]"     => "%{[log_type]}"
        "[scan][log_file]"     => "%{[log_file]}"
        "[scan][threshold]"    => "%{[threshold]}"
      }
      remove_field => ["generated_at", "log_type", "log_file", "threshold", "since", "total_findings"]
    }

    # Promote nested finding fields up to the document root.
    ruby {
      code => '
        f = event.get("findings")
        if f.is_a?(Hash)
          f.each { |k, v| event.set(k, v) unless event.get(k) }
        end
        event.remove("findings")
      '
    }
  }

  # Normalize severity casing
  if [severity] {
    mutate { uppercase => ["severity"] }
  }

  # ATT&CK technique normalization — LogHound emits e.g. "T1110.001"
  if [mitre_technique] {
    mutate { add_field => { "[mitre][technique_id]" => "%{mitre_technique}" } }
  }
  if [mitre_tactic] {
    mutate { add_field => { "[mitre][tactic]" => "%{mitre_tactic}" } }
  }

  # ECS-ish field aliases for cross-source dashboards
  if [source_ip] {
    mutate { add_field => { "[source][ip]" => "%{source_ip}" } }
  }

  mutate { add_field => { "source_tool" => "loghound" } }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bluestack-loghound-%{+YYYY.MM.dd}"
    action => "create"
  }
}
