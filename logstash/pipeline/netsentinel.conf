# NetSentinel ingestion pipeline
#
# NetSentinel emits newline-delimited JSON — one event per line.
# Each event has: timestamp, severity, event_type, source_ip, destination,
# detail, plus event-specific extras (target_port, scan_type, etc.).

input {
  tcp {
    port => 5002
    codec => json_lines
    type => "netsentinel"
    tags => ["netsentinel", "network-security", "scapy"]
  }
}

filter {
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  if [severity] {
    mutate { uppercase => ["severity"] }
  }

  # Map event_type -> ATT&CK technique. NetSentinel's README lists these.
  if [event_type] == "arp_spoof" {
    mutate { add_field => { "[mitre][technique_id]" => "T1557.002"
                            "[mitre][tactic]"       => "credential-access" } }
  } else if [event_type] == "port_scan" {
    mutate { add_field => { "[mitre][technique_id]" => "T1046"
                            "[mitre][tactic]"       => "discovery" } }
  } else if [event_type] == "icmp_flood" {
    mutate { add_field => { "[mitre][technique_id]" => "T1499.003"
                            "[mitre][tactic]"       => "impact" } }
  } else if [event_type] == "dns_hijack" {
    mutate { add_field => { "[mitre][technique_id]" => "T1071.004"
                            "[mitre][tactic]"       => "command-and-control" } }
  } else if [event_type] == "dns_tunnel" {
    mutate { add_field => { "[mitre][technique_id]" => "T1041"
                            "[mitre][tactic]"       => "exfiltration" } }
  }

  if [source_ip] {
    mutate { add_field => { "[source][ip]" => "%{source_ip}" } }
  }
  if [destination] {
    mutate { add_field => { "[destination][address]" => "%{destination}" } }
  }

  mutate { add_field => { "source_tool" => "netsentinel" } }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bluestack-netsentinel-%{+YYYY.MM.dd}"
    action => "create"
  }
}
