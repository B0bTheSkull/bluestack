# ThreatPulse ingestion pipeline
#
# Two ThreatPulse data flows are accepted:
#   1. IOC lookup results — one JSON dict per line:
#        {"ioc","type","threat_level","sources_queried","results":[...]}
#   2. Cached blocklist dumps — one IOC per line as a flat doc:
#        {"ioc","type","source","first_seen","tags":[...]}
#
# Both shapes share the `ioc` field, so we route on its presence.

input {
  tcp {
    port => 5004
    codec => json_lines
    type => "threatpulse"
    tags => ["threatpulse", "threat-intel"]
  }
}

filter {
  # Lookup-result shape has the `results` array.
  if [results] {
    mutate { add_field => { "[threatpulse][kind]" => "lookup_result" } }

    if [threat_level] {
      mutate { uppercase => ["threat_level"] }
      if [threat_level] == "MALICIOUS" {
        mutate { add_field => { "severity" => "HIGH" } }
      } else {
        mutate { add_field => { "severity" => "INFO" } }
      }
    }

    # Capture which feeds returned a hit
    ruby {
      code => '
        results = event.get("results")
        if results.is_a?(Array)
          hits = results.select { |r| r.is_a?(Hash) && r["found"] }
                        .map { |r| r["source"] }
                        .compact
          event.set("[threatpulse][hits]", hits)
          event.set("[threatpulse][hit_count]", hits.length)
        end
      '
    }
  } else {
    # Blocklist-dump shape
    mutate { add_field => { "[threatpulse][kind]" => "blocklist_entry" } }
    mutate { add_field => { "severity" => "INFO" } }
  }

  if [ioc] {
    mutate { add_field => { "[threatpulse][ioc]" => "%{ioc}" } }
  }
  if [type] {
    mutate { add_field => { "[threatpulse][ioc_type]" => "%{type}" } }
  }

  mutate { add_field => { "source_tool" => "threatpulse" } }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bluestack-threatpulse-%{+YYYY.MM.dd}"
    action => "create"
  }
}
